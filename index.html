<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>쇼츠 대본 자동 생성기</title>

<style>
body {
  margin: 0;
  background: #f4f6ff;
  font-family: Arial, sans-serif;
}

.container {
  max-width: 900px;
  margin: 30px auto;
  background: white;
  padding: 30px;
  border-radius: 18px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

h1 {
  text-align: center;
}

textarea, select {
  width: 100%;
  box-sizing: border-box;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #ddd;
  margin-top: 8px;
}

textarea {
  min-height: 200px;
}

button {
  width: 100%;
  padding: 16px;
  margin-top: 20px;
  background: #4f63ff;
  color: white;
  border: none;
  border-radius: 14px;
  font-size: 18px;
  cursor: pointer;
}

.card {
  background: #f7f8ff;
  border-radius: 16px;
  padding: 20px;
  margin-top: 20px;
}

pre {
  white-space: pre-wrap;
}

.loading {
  display: none;
  text-align: center;
  margin-top: 20px;
  font-weight: bold;
}

.result {
  display: none;
}

.copy-btn {
  margin-top: 10px;
  width: auto;
  padding: 10px 14px;
  background: black;
  font-size: 14px;
}
</style>
</head>

<body>
<div class="container">
  <h1>🎬 쇼츠 자동 생성기</h1>

  <textarea id="sourceText" placeholder="기사 붙여넣기"></textarea>

  <select id="tone">
    <option>연예뉴스</option>
    <option>사건사고</option>
    <option>논란정리</option>
  </select>

  <button onclick="generateShorts()">쇼츠 대본 만들기</button>

  <div class="loading" id="loading">생성 중...</div>

  <div class="result" id="result">
    <div class="card">
      <h2>제목</h2>
      <pre id="title"></pre>
    </div>

    <div class="card">
      <h2>훅</h2>
      <pre id="hook"></pre>
    </div>

    <div class="card">
      <h2>대본</h2>
      <pre id="script"></pre>
      <button class="copy-btn" onclick="makeTTS()">AI 음성 만들기</button>
    </div>

    <div class="card">
      <h2>썸네일</h2>
      <pre id="thumbnail"></pre>
    </div>

    <div class="card">
      <h2>해시태그</h2>
      <pre id="hashtags"></pre>
    </div>
  </div>
</div>

<script>
const API_URL = "https://shorts-maker-api.onrender.com";

async function generateShorts() {
  const sourceText = document.getElementById("sourceText").value.trim();
  const tone = document.getElementById("tone").value;

  if (!sourceText) {
    alert("기사 입력해줘");
    return;
  }

  document.getElementById("loading").style.display = "block";

  try {
    const res = await fetch(API_URL + "/make-shorts", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        source_text: sourceText,
        tone: tone
      })
    });

    const data = await res.json();

    document.getElementById("title").innerText = data.title || "";
    document.getElementById("hook").innerText = data.hook || "";
    document.getElementById("script").innerText = data.script || "";
    document.getElementById("thumbnail").innerText = data.thumbnail_text || "";
    document.getElementById("hashtags").innerText =
      (data.hashtags || []).join(" ");

    document.getElementById("result").style.display = "block";

  } catch (err) {
    alert("에러: " + err.message);
  } finally {
    document.getElementById("loading").style.display = "none";
  }
}

async function makeTTS() {
  const scriptText = document.getElementById("script").innerText;

  if (!scriptText) {
    alert("먼저 대본 생성해줘");
    return;
  }

  try {
    const res = await fetch(API_URL + "/make-tts", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        text: scriptText
      })
    });

    const data = await res.json();

    const audioUrl = API_URL + data.audio_url;

    const audio = document.createElement("audio");
    audio.controls = true;
    audio.src = audioUrl;
    audio.style.marginTop = "20px";

    document.getElementById("script").parentElement.appendChild(audio);

  } catch (err) {
    alert("TTS 실패: " + err.message);
  }
}
</script>
</body>
</html>
