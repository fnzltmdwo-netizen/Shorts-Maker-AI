<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shorts Maker AI</title>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #fff7d6, #ffe2ef);
      font-family: Arial, "Noto Sans KR", sans-serif;
      color: #222;
    }

    .container {
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.12);
    }

    h1 { text-align: center; margin: 0 0 10px; }
    h2 { margin-top: 0; }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .tab {
      flex: 1;
      min-width: 180px;
      padding: 14px;
      border-radius: 14px;
      border: none;
      font-weight: 800;
      cursor: pointer;
      background: #f1f1f1;
    }

    .tab.active {
      background: #ffb703;
      color: #111;
    }

    .section { display: none; }
    .section.active { display: block; }

    .field { margin-bottom: 18px; }

    .label {
      display: block;
      font-weight: 800;
      margin-bottom: 10px;
    }

    input, textarea, select {
      width: 100%;
      border: 2px solid #eee;
      border-radius: 16px;
      padding: 16px;
      font-size: 16px;
      font-family: inherit;
      outline: none;
    }

    textarea {
      min-height: 300px;
      resize: vertical;
      line-height: 1.6;
    }

    input:focus, textarea:focus, select:focus {
      border-color: #ffb703;
    }

    .buttons {
      display: flex;
      gap: 12px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    button {
      flex: 1;
      min-width: 180px;
      border: none;
      border-radius: 14px;
      padding: 16px 20px;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
    }

    .primary { background: #ffb703; color: #111; }
    .secondary { background: #f1f1f1; color: #333; }
    .danger { background: #ffecec; color: #b00020; }

    .status {
      display: none;
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 14px;
      white-space: pre-line;
      line-height: 1.5;
    }

    .status.info { display: block; background: #eef6ff; color: #23527c; }
    .status.success { display: block; background: #eaf8ef; color: #1f7a3f; }
    .status.error { display: block; background: #ffecec; color: #b00020; }

    .paste-box {
      margin-top: 10px;
      border: 2px dashed #ffb703;
      border-radius: 16px;
      padding: 18px;
      text-align: center;
      background: #fffaf0;
      font-weight: 800;
      cursor: pointer;
    }

    .sample {
      color: #777;
      font-size: 14px;
      line-height: 1.5;
    }

    .file-list {
      display: none;
      margin-top: 10px;
      padding: 12px;
      border-radius: 12px;
      background: #fafafa;
      border: 1px solid #eee;
      white-space: pre-line;
      font-size: 14px;
      color: #555;
    }

    .thumb-grid {
      display: none;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .thumb {
      position: relative;
      height: 110px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #eee;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .thumb button {
      position: absolute;
      top: 5px;
      right: 5px;
      min-width: auto;
      width: 26px;
      height: 26px;
      padding: 0;
      border-radius: 50%;
      background: rgba(0,0,0,0.65);
      color: white;
      font-size: 14px;
    }

    .preview, .result-box {
      display: none;
      margin-top: 24px;
    }

    .block, .person-card {
      border: 1px solid #eee;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
      background: #fafafa;
    }

    .time {
      font-weight: 800;
      color: #ff8a00;
      margin-bottom: 6px;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 16px 0;
    }

    .person-name {
      font-size: 26px;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .badge {
      display: inline-block;
      margin-right: 6px;
      margin-bottom: 6px;
      padding: 5px 9px;
      border-radius: 999px;
      background: #fff1bd;
      font-size: 13px;
      font-weight: 800;
    }

    .link-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .search-link {
      display: inline-block;
      color: #111;
      background: #ffb703;
      padding: 10px 14px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 800;
    }

    .image-link { background: #ffe08a; }

    .thumbnail-area {
      margin-top: 24px;
      display: flex;
      justify-content: center;
      overflow-x: auto;
      padding-bottom: 10px;
    }

    .flash-thumb {
      position: relative;
      width: 1280px;
      height: 720px;
      flex: 0 0 auto;
      overflow: hidden;
      background: #111;
      border-radius: 18px;
      transform-origin: top center;
      transform: scale(0.65);
      margin-bottom: -250px;
    }

    .flash-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      filter: saturate(1.3) contrast(1.08);
    }

    .flash-bg::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 18%, rgba(255,0,200,0.45), transparent 35%),
        radial-gradient(circle at 85% 15%, rgba(255,230,0,0.32), transparent 30%),
        linear-gradient(to bottom, rgba(0,0,0,0.05), rgba(0,0,0,0.55));
    }

    .flash-label {
      position: absolute;
      left: 28px;
      top: 20px;
      padding: 8px 20px;
      background: linear-gradient(135deg, #ff007a, #ffcf00);
      color: white;
      font-size: 34px;
      font-weight: 1000;
      border-radius: 999px;
      -webkit-text-stroke: 1px #5b004f;
      text-shadow: 0 3px 0 #5b004f, 0 0 14px #fff;
      transform: rotate(-4deg);
    }

    .flash-logo {
      position: absolute;
      right: 24px;
      top: 22px;
      width: 118px;
      height: 118px;
      border-radius: 50%;
      background: white;
      border: 7px solid #ff3030;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e60000;
      font-size: 34px;
      font-weight: 1000;
      text-align: center;
      line-height: 0.9;
      box-shadow: 0 0 0 4px #fff, 0 6px 18px rgba(0,0,0,0.35);
    }

    .flash-main {
      position: absolute;
      left: 38px;
      bottom: 95px;
      width: 860px;
      font-size: 76px;
      font-weight: 1000;
      line-height: 1.08;
      color: white;
      -webkit-text-stroke: 6px #111;
      text-shadow:
        0 6px 0 #111,
        0 0 18px #ff00d4,
        0 0 26px #00d8ff;
      letter-spacing: -4px;
    }

    .flash-sub {
      display: inline-block;
      margin-top: 8px;
      font-size: 88px;
      font-weight: 1000;
      line-height: 1.05;
      background: linear-gradient(180deg, #ffffff 0%, #ff63f7 35%, #00d8ff 100%);
      -webkit-background-clip: text;
      color: transparent;
      -webkit-text-stroke: 5px #111;
      text-shadow:
        0 5px 0 #111,
        0 0 16px #ff00d4,
        0 0 26px #00d8ff;
    }

    .flash-time {
      position: absolute;
      right: 42px;
      bottom: 108px;
      font-size: 112px;
      font-weight: 1000;
      color: #fff200;
      -webkit-text-stroke: 7px #6b0000;
      text-shadow:
        0 6px 0 #111,
        0 0 18px #ff6a00,
        0 0 30px #fff200;
      transform: rotate(-5deg);
    }

    .flash-border {
      position: absolute;
      inset: 0;
      border: 10px solid #ff62d8;
      box-shadow: inset 0 0 0 6px #fff, inset 0 0 22px #ff00d4;
      pointer-events: none;
    }

    .footer {
      text-align: center;
      color: #777;
      font-size: 14px;
      margin-top: 18px;
    }

    @media (max-width: 800px) {
      .flash-thumb {
        transform: scale(0.42);
        margin-bottom: -400px;
      }
    }

    @media (max-width: 600px) {
      .container { padding: 24px 12px; }
      .card { padding: 24px 18px; }
      .tabs { flex-direction: column; }
      .filter-grid { grid-template-columns: 1fr; }
      button { width: 100%; }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <h1>🎬 Shorts Maker AI</h1>
      <p class="subtitle">음성 패키지 + 트로트 인물 추천 + 삐까뻔쩍 썸네일 생성</p>

      <div class="tabs">
        <button class="tab active" onclick="showTab('audio')">🎧 Audio Pack</button>
        <button class="tab" onclick="showTab('trot')">🎲 트로트 인물 추천</button>
        <button class="tab" onclick="showTab('thumbnail')">✨ 썸네일 생성</button>
      </div>

      <section id="audioSection" class="section active">
        <div class="field">
          <label class="label">영상 제목 / 폴더명</label>
          <input id="titleInput" type="text" placeholder="예: 영상75 EXID 출신 강혜연 반전 근황" />
        </div>

        <div class="field">
          <label class="label">쇼츠 대본</label>
          <textarea id="scriptInput" placeholder="예시:
0~2초
강혜연의 반전 근황이 공개됐습니다

2~6초
EXID 출신으로 알려진 강혜연은..."></textarea>
        </div>

        <div class="field">
          <label class="label">이미지 업로드</label>
          <input id="imageInput" type="file" accept="image/*" multiple onchange="addSelectedFilesFromInput()" />

          <div id="pasteBox" class="paste-box" tabindex="0" onclick="focusPasteBox()">
            📸 여기를 클릭한 뒤 Ctrl+V로 캡처 이미지 붙여넣기<br />
            <span class="sample">파일 선택 / 캡처 붙여넣기 둘 다 가능</span>
          </div>

          <div class="buttons">
            <button class="danger" onclick="clearImages()">이미지 전체 삭제</button>
          </div>

          <div id="fileList" class="file-list"></div>
          <div id="thumbGrid" class="thumb-grid"></div>
        </div>

        <div class="buttons">
          <button class="secondary" onclick="previewScript()">대본 확인</button>
          <button class="primary" onclick="generatePack()">패키지 생성 & 다운로드</button>
        </div>

        <div id="status" class="status"></div>

        <div id="preview" class="preview">
          <h2>대본 분석 결과</h2>
          <div id="previewList"></div>
        </div>
      </section>

      <section id="trotSection" class="section">
        <h2>🎲 트로트 인물 랜덤 추천기</h2>

        <div class="filter-grid">
          <div>
            <label class="label">성별</label>
            <select id="genderFilter">
              <option value="전체">전체</option>
              <option value="남자">남자</option>
              <option value="여자">여자</option>
            </select>
          </div>

          <div>
            <label class="label">화제도</label>
            <select id="levelFilter">
              <option value="전체">전체</option>
              <option value="HOT">HOT</option>
              <option value="숨은인물">숨은인물</option>
            </select>
          </div>
        </div>

        <div class="buttons">
          <button class="primary" onclick="pickOnePerson()">1명 추천</button>
          <button class="secondary" onclick="pickFivePeople()">5명 추천</button>
        </div>

        <div id="trotStatus" class="status"></div>

        <div id="trotResult" class="result-box">
          <h2>추천 결과</h2>
          <div id="personList"></div>
        </div>
      </section>

      <section id="thumbnailSection" class="section">
        <h2>✨ 삐까뻔쩍 썸네일 생성기</h2>

        <div class="field">
          <label class="label">썸네일 사진</label>
          <input id="flashImageInput" type="file" accept="image/*" onchange="loadFlashImage()" />
        </div>

        <div class="field">
          <label class="label">상단 작은 라벨</label>
          <input id="flashLabelInput" type="text" value="새 동영상" oninput="updateFlashThumbnail()" />
        </div>

        <div class="field">
          <label class="label">흰색 메인 문구</label>
          <input id="flashMainInput" type="text" value="인형 미모의 노래 모음" oninput="updateFlashThumbnail()" />
        </div>

        <div class="field">
          <label class="label">그라데이션 강조 문구</label>
          <input id="flashSubInput" type="text" value="트롯 바비 홍지윤" oninput="updateFlashThumbnail()" />
        </div>

        <div class="field">
          <label class="label">오른쪽 강조 문구</label>
          <input id="flashTimeInput" type="text" value="100분" oninput="updateFlashThumbnail()" />
        </div>

        <div class="buttons">
          <button class="primary" onclick="downloadFlashThumbnail()">썸네일 JPG 다운로드</button>
        </div>

        <div id="thumbnailStatus" class="status"></div>

        <div class="thumbnail-area">
          <div id="flashThumb" class="flash-thumb">
            <div id="flashBg" class="flash-bg"></div>
            <div id="flashLabel" class="flash-label">새 동영상</div>
            <div class="flash-logo">JOY</div>
            <div class="flash-main">
              <div id="flashMain">인형 미모의 노래 모음</div>
              <div id="flashSub" class="flash-sub">트롯 바비 홍지윤</div>
            </div>
            <div id="flashTime" class="flash-time">100분</div>
            <div class="flash-border"></div>
          </div>
        </div>
      </section>
    </div>

    <div class="footer">Shorts Maker AI v2</div>
  </div>

  <script>
    const API_BASE_URL = "https://shorts-maker-api.onrender.com";
    let selectedImages = [];
    let flashImageLoaded = false;

    function showTab(tab) {
      document.querySelectorAll(".tab").forEach((btn) => btn.classList.remove("active"));
      document.querySelectorAll(".section").forEach((sec) => sec.classList.remove("active"));

      if (tab === "audio") {
        document.querySelectorAll(".tab")[0].classList.add("active");
        document.getElementById("audioSection").classList.add("active");
      } else if (tab === "trot") {
        document.querySelectorAll(".tab")[1].classList.add("active");
        document.getElementById("trotSection").classList.add("active");
      } else {
        document.querySelectorAll(".tab")[2].classList.add("active");
        document.getElementById("thumbnailSection").classList.add("active");
      }
    }

    function setStatus(message, type = "info") {
      const status = document.getElementById("status");
      status.className = "status " + type;
      status.textContent = message;
    }

    function setTrotStatus(message, type = "info") {
      const status = document.getElementById("trotStatus");
      status.className = "status " + type;
      status.textContent = message;
    }

    function setThumbnailStatus(message, type = "info") {
      const status = document.getElementById("thumbnailStatus");
      status.className = "status " + type;
      status.textContent = message;
    }

    function validateScript(script) {
      if (!script) {
        setStatus("대본을 입력해줘!", "error");
        return false;
      }

      if (!script.match(/\d+(\.\d+)?\s*[~\\-]\s*\d+(\.\d+)?\s*초/)) {
        setStatus("시간 형식이 필요해!\\n예: 0~2초", "error");
        return false;
      }

      return true;
    }

    function focusPasteBox() {
      document.getElementById("pasteBox").focus();
      setStatus("이제 Ctrl+V로 캡처 이미지를 붙여넣으면 돼!", "info");
    }

    document.addEventListener("paste", (event) => {
      const audioSection = document.getElementById("audioSection");

      if (!audioSection.classList.contains("active")) return;

      const items = event.clipboardData && event.clipboardData.items;
      if (!items) return;

      let added = 0;

      for (const item of items) {
        if (item.type && item.type.startsWith("image/")) {
          const blob = item.getAsFile();
          if (blob) {
            const ext = item.type.includes("png") ? "png" : "jpg";
            const filename = `clipboard_${Date.now()}_${selectedImages.length + 1}.${ext}`;
            selectedImages.push(new File([blob], filename, { type: blob.type }));
            added += 1;
          }
        }
      }

      if (added > 0) {
        event.preventDefault();
        renderImageList();
        setStatus(`캡처 이미지 ${added}개 붙여넣기 완료!`, "success");
      }
    });

    function addSelectedFilesFromInput() {
      const input = document.getElementById("imageInput");
      const files = Array.from(input.files || []);

      files.forEach((file) => {
        if (file.type.startsWith("image/")) selectedImages.push(file);
      });

      input.value = "";
      renderImageList();
    }

    function clearImages() {
      selectedImages = [];
      renderImageList();
      setStatus("이미지를 모두 삭제했어.", "info");
    }

    function removeImage(index) {
      selectedImages.splice(index, 1);
      renderImageList();
    }

    function renderImageList() {
      const fileList = document.getElementById("fileList");
      const thumbGrid = document.getElementById("thumbGrid");

      if (selectedImages.length === 0) {
        fileList.style.display = "none";
        fileList.textContent = "";
        thumbGrid.style.display = "none";
        thumbGrid.innerHTML = "";
        return;
      }

      fileList.style.display = "block";
      fileList.textContent =
        `선택된 이미지 ${selectedImages.length}개\\n` +
        selectedImages.map((file, i) => `이미지${String(i + 1).padStart(2, "0")} → ${file.name}`).join("\\n");

      thumbGrid.style.display = "grid";
      thumbGrid.innerHTML = "";

      selectedImages.forEach((file, index) => {
        const url = URL.createObjectURL(file);
        const div = document.createElement("div");
        div.className = "thumb";
        div.innerHTML = `<img src="${url}" /><button onclick="removeImage(${index})">×</button>`;
        thumbGrid.appendChild(div);
      });
    }

    async function previewScript() {
      const title = document.getElementById("titleInput").value.trim() || "shorts_project";
      const script = document.getElementById("scriptInput").value.trim();

      if (!validateScript(script)) return;

      setStatus("대본을 분석하는 중...", "info");

      try {
        const response = await fetch(API_BASE_URL + "/parse-script", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title, script }),
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data.detail || "대본 분석 실패");

        const preview = document.getElementById("preview");
        const previewList = document.getElementById("previewList");
        previewList.innerHTML = "";

        data.blocks.forEach((block, index) => {
          const div = document.createElement("div");
          div.className = "block";
          div.innerHTML = `
            <div class="time">${index + 1}. ${block.start}초 ~ ${block.end}초</div>
            <div>${escapeHtml(block.text)}</div>
          `;
          previewList.appendChild(div);
        });

        preview.style.display = "block";
        setStatus(`대본 분석 완료! 총 ${data.count}개 구간`, "success");
      } catch (error) {
        setStatus("오류 발생: " + error.message, "error");
      }
    }

    async function generatePack() {
      const title = document.getElementById("titleInput").value.trim() || "shorts_project";
      const script = document.getElementById("scriptInput").value.trim();

      if (!validateScript(script)) return;

      setStatus("음성 + 이미지 패키지를 생성하는 중...", "info");

      try {
        const formData = new FormData();
        formData.append("title", title);
        formData.append("script", script);

        selectedImages.forEach((file) => {
          formData.append("images", file);
        });

        const response = await fetch(API_BASE_URL + "/generate-pack", {
          method: "POST",
          body: formData,
        });

        if (!response.ok) {
          let message = "패키지 생성 실패";
          try {
            const data = await response.json();
            message = data.detail || message;
          } catch (e) {}
          throw new Error(message);
        }

        const blob = await response.blob();
        downloadBlob(blob, "shorts_pack.zip");
        setStatus("완료! zip 다운로드가 시작됐어 🎉", "success");
      } catch (error) {
        setStatus("오류 발생: " + error.message, "error");
      }
    }

    async function pickOnePerson() {
      const gender = document.getElementById("genderFilter").value;
      const level = document.getElementById("levelFilter").value;

      setTrotStatus("추천 중...", "info");

      try {
        const url = `${API_BASE_URL}/random-trot-person?gender=${encodeURIComponent(gender)}&level=${encodeURIComponent(level)}`;
        const response = await fetch(url);
        const data = await response.json();

        if (!response.ok) throw new Error(data.detail || "추천 실패");

        renderPeople([data.person]);
        setTrotStatus("1명 추천 완료!", "success");
      } catch (error) {
        setTrotStatus("오류 발생: " + error.message, "error");
      }
    }

    async function pickFivePeople() {
      const gender = document.getElementById("genderFilter").value;
      const level = document.getElementById("levelFilter").value;

      setTrotStatus("추천 중...", "info");

      try {
        const url = `${API_BASE_URL}/random-trot-people?count=5&gender=${encodeURIComponent(gender)}&level=${encodeURIComponent(level)}`;
        const response = await fetch(url);
        const data = await response.json();

        if (!response.ok) throw new Error(data.detail || "추천 실패");

        renderPeople(data.people);
        setTrotStatus(`${data.count}명 추천 완료!`, "success");
      } catch (error) {
        setTrotStatus("오류 발생: " + error.message, "error");
      }
    }

    function renderPeople(people) {
      const result = document.getElementById("trotResult");
      const list = document.getElementById("personList");
      list.innerHTML = "";

      people.forEach((person) => {
        const div = document.createElement("div");
        div.className = "person-card";
        div.innerHTML = `
          <div class="person-name">${escapeHtml(person.name)}</div>
          <span class="badge">${escapeHtml(person.gender)}</span>
          <span class="badge">${escapeHtml(person.level)}</span>
          <span class="badge">${escapeHtml(person.category)}</span>
          <div class="link-row">
            <a class="search-link" href="${person.google_news_url}" target="_blank">📰 최신 기사 보기</a>
            <a class="search-link image-link" href="${person.google_image_url}" target="_blank">🖼 사진 찾기</a>
          </div>
        `;
        list.appendChild(div);
      });

      result.style.display = "block";
    }

    function loadFlashImage() {
      const input = document.getElementById("flashImageInput");
      const file = input.files[0];

      if (!file) return;

      const url = URL.createObjectURL(file);
      document.getElementById("flashBg").style.backgroundImage = `url('${url}')`;
      flashImageLoaded = true;
      setThumbnailStatus("이미지 적용 완료!", "success");
    }

    function updateFlashThumbnail() {
      document.getElementById("flashLabel").textContent =
        document.getElementById("flashLabelInput").value || "새 동영상";

      document.getElementById("flashMain").textContent =
        document.getElementById("flashMainInput").value || "인형 미모의 노래 모음";

      document.getElementById("flashSub").textContent =
        document.getElementById("flashSubInput").value || "트롯 바비 홍지윤";

      document.getElementById("flashTime").textContent =
        document.getElementById("flashTimeInput").value || "100분";
    }

    async function downloadFlashThumbnail() {
      updateFlashThumbnail();

      if (!flashImageLoaded) {
        setThumbnailStatus("먼저 썸네일 사진을 선택해줘!", "error");
        return;
      }

      setThumbnailStatus("썸네일 이미지 생성 중...", "info");

      const target = document.getElementById("flashThumb");

      const canvas = await html2canvas(target, {
        scale: 1,
        useCORS: true,
        backgroundColor: null,
        width: 1280,
        height: 720,
      });

      canvas.toBlob((blob) => {
        downloadBlob(blob, "flash_thumbnail.jpg");
        setThumbnailStatus("완료! JPG 다운로드가 시작됐어 🎉", "success");
      }, "image/jpeg", 0.95);
    }

    function downloadBlob(blob, filename) {
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      window.URL.revokeObjectURL(url);
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
