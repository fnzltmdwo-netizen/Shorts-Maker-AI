<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Shorts Maker AI - Audio Pack</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #fff7d6, #ffe2ef);
      font-family: Arial, "Noto Sans KR", sans-serif;
      color: #222;
    }

    .container {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 32px;
      text-align: center;
    }

    .subtitle {
      margin: 0 0 28px;
      text-align: center;
      color: #666;
      line-height: 1.6;
    }

    .label {
      font-weight: 700;
      margin-bottom: 10px;
      display: block;
    }

    textarea {
      width: 100%;
      min-height: 360px;
      resize: vertical;
      border: 2px solid #eee;
      border-radius: 16px;
      padding: 18px;
      font-size: 16px;
      line-height: 1.6;
      outline: none;
      font-family: inherit;
    }

    textarea:focus {
      border-color: #ffb703;
    }

    .buttons {
      display: flex;
      gap: 12px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    button {
      flex: 1;
      min-width: 180px;
      border: none;
      border-radius: 14px;
      padding: 16px 20px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.15s;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .primary {
      background: #ffb703;
      color: #111;
    }

    .primary:hover:not(:disabled) {
      background: #ffa600;
      transform: translateY(-1px);
    }

    .secondary {
      background: #f1f1f1;
      color: #333;
    }

    .secondary:hover:not(:disabled) {
      background: #e6e6e6;
    }

    .status {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 14px;
      display: none;
      line-height: 1.5;
      white-space: pre-line;
    }

    .status.info {
      display: block;
      background: #eef6ff;
      color: #23527c;
    }

    .status.success {
      display: block;
      background: #eaf8ef;
      color: #1f7a3f;
    }

    .status.error {
      display: block;
      background: #ffecec;
      color: #b00020;
    }

    .preview {
      margin-top: 24px;
      display: none;
    }

    .preview h2 {
      margin: 0 0 12px;
      font-size: 22px;
    }

    .block {
      border: 1px solid #eee;
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 10px;
      background: #fafafa;
    }

    .time {
      font-weight: 700;
      color: #ff8a00;
      margin-bottom: 6px;
    }

    .footer {
      text-align: center;
      color: #777;
      font-size: 13px;
      margin-top: 18px;
      line-height: 1.5;
    }

    .sample {
      margin-top: 14px;
      font-size: 14px;
      color: #777;
      line-height: 1.5;
    }

    @media (max-width: 600px) {
      .card {
        padding: 24px 18px;
      }

      h1 {
        font-size: 26px;
      }

      textarea {
        min-height: 300px;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <h1>🎬 Shorts Maker AI</h1>
      <p class="subtitle">
        쇼츠 대본을 붙여넣으면<br />
        프리미어용 음성 패키지를 자동 생성합니다.
      </p>

      <label class="label" for="scriptInput">쇼츠 대본</label>

      <textarea id="scriptInput" placeholder="예시:
0~2초
송가인이 빵집 사장님 선언했습니다

2~6초
송가인이 버킷리스트였던 베이킹에 도전했는데요

6~10초
정다경 강예슬 김희진 두리와 함께해 특급 케미를 선보였습니다"></textarea>

      <div class="sample">
        형식: <b>0~2초</b> 다음 줄에 대본을 입력하면 됩니다.
      </div>

      <div class="buttons">
        <button class="secondary" onclick="previewScript()">대본 확인</button>
        <button class="primary" onclick="generatePack()">패키지 생성 & 다운로드</button>
      </div>

      <div id="status" class="status"></div>

      <div id="preview" class="preview">
        <h2>대본 분석 결과</h2>
        <div id="previewList"></div>
      </div>
    </div>

    <div class="footer">
      생성 파일: 1.mp3, 2.mp3, subtitles.srt, script.txt, premiere_guide.txt
    </div>
  </div>

  <script>
    const API_BASE_URL = "https://shorts-maker-api.onrender.com";

    function setStatus(message, type = "info") {
      const status = document.getElementById("status");
      status.className = "status " + type;
      status.textContent = message;
    }

    function getScriptText() {
      return document.getElementById("scriptInput").value.trim();
    }

    function validateScript(script) {
      if (!script) {
        setStatus("대본을 입력해줘!", "error");
        return false;
      }

      if (!script.match(/\d+(\.\d+)?\s*[~\-]\s*\d+(\.\d+)?\s*초/)) {
        setStatus("시간 형식이 필요해!\n예: 0~2초", "error");
        return false;
      }

      return true;
    }

    async function previewScript() {
      const script = getScriptText();

      if (!validateScript(script)) {
        return;
      }

      setStatus("대본을 분석하는 중...", "info");

      try {
        const response = await fetch(API_BASE_URL + "/parse-script", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ script }),
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.detail || "대본 분석 실패");
        }

        const preview = document.getElementById("preview");
        const previewList = document.getElementById("previewList");

        previewList.innerHTML = "";

        data.blocks.forEach((block, index) => {
          const div = document.createElement("div");
          div.className = "block";

          div.innerHTML = `
            <div class="time">${index + 1}. ${block.start}초 ~ ${block.end}초</div>
            <div>${escapeHtml(block.text)}</div>
          `;

          previewList.appendChild(div);
        });

        preview.style.display = "block";
        setStatus(`대본 분석 완료! 총 ${data.count}개 구간`, "success");
      } catch (error) {
        setStatus("오류 발생: " + error.message, "error");
      }
    }

    async function generatePack() {
      const script = getScriptText();

      if (!validateScript(script)) {
        return;
      }

      const buttons = document.querySelectorAll("button");
      buttons.forEach((button) => (button.disabled = true));

      setStatus(
        "음성 패키지를 생성하는 중...\nElevenLabs 음성 생성 때문에 조금 걸릴 수 있어.",
        "info"
      );

      try {
        const response = await fetch(API_BASE_URL + "/generate-pack", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ script }),
        });

        if (!response.ok) {
          let message = "패키지 생성 실패";

          try {
            const data = await response.json();
            message = data.detail || message;
          } catch (e) {}

          throw new Error(message);
        }

        const blob = await response.blob();

        const disposition = response.headers.get("Content-Disposition");
        let filename = "audio_pack.zip";

        if (disposition && disposition.includes("filename=")) {
          filename = disposition
            .split("filename=")[1]
            .replaceAll('"', "")
            .trim();
        }

        const url = window.URL.createObjectURL(blob);
        const a = document.createElement("a");

        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();

        a.remove();
        window.URL.revokeObjectURL(url);

        setStatus("완료! zip 파일 다운로드가 시작됐어 🎉", "success");
      } catch (error) {
        setStatus("오류 발생: " + error.message, "error");
      } finally {
        buttons.forEach((button) => (button.disabled = false));
      }
    }

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
