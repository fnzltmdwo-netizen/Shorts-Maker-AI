<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI 쇼츠 메이커</title>

<style>
body{
  margin:0;
  background:#f4f6ff;
  font-family:Arial,sans-serif;
}
.container{
  max-width:1000px;
  margin:30px auto;
  background:white;
  padding:30px;
  border-radius:18px;
  box-shadow:0 4px 20px rgba(0,0,0,.08);
}
h1{text-align:center}
textarea,select{
  width:100%;
  box-sizing:border-box;
  padding:14px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-top:8px;
}
textarea{min-height:220px}
button{
  width:100%;
  padding:16px;
  margin-top:16px;
  border:none;
  border-radius:14px;
  background:#4f63ff;
  color:white;
  font-size:18px;
  cursor:pointer;
}
.card{
  background:#f7f8ff;
  border-radius:16px;
  padding:20px;
  margin-top:20px;
}
pre{
  white-space:pre-wrap;
  line-height:1.6;
}
.loading{
  display:none;
  text-align:center;
  margin-top:20px;
  font-weight:bold;
}
.result{
  display:none;
}
audio{
  width:100%;
  margin-top:20px;
}
.action-btn{
  width:auto;
  padding:12px 18px;
  font-size:14px;
  margin-right:10px;
}
</style>
</head>

<body>
<div class="container">
  <h1>🎬 AI 쇼츠 메이커</h1>

  <textarea id="sourceText" placeholder="기사 붙여넣기"></textarea>

  <select id="tone">
    <option>초대형 라인업형</option>
    <option>팬덤 싸움형</option>
    <option>논란 폭발형</option>
  </select>

  <button onclick="generateShorts()">쇼츠 생성</button>

  <div class="loading" id="loading">AI가 쇼츠 만드는 중...</div>

  <div class="result" id="result">

    <div class="card">
      <h2>🎬 숏츠 대본</h2>
      <pre id="formatted_script"></pre>
    </div>

    <div class="card">
      <h2>🔥 제목 후보</h2>
      <pre id="titles"></pre>
    </div>

    <div class="card">
      <h2>🏆 추천 제목</h2>
      <pre id="recommended_title"></pre>
    </div>

    <div class="card">
      <h2>🖼 썸네일 문구</h2>
      <pre id="thumbnail_texts"></pre>
    </div>

    <div class="card">
      <h2>📈 조회수 포인트</h2>
      <pre id="view_points"></pre>
    </div>

    <div class="card">
      <h2>💬 댓글 유도</h2>
      <pre id="comment_hooks"></pre>
    </div>

    <div class="card">
      <h2>💣 강한 버전</h2>
      <pre id="strong_version"></pre>
    </div>

    <div class="card">
      <h2>🎙 음성 / 자막</h2>
      <button class="action-btn" onclick="makeTTS()">AI 음성 만들기</button>
      <button class="action-btn" onclick="makeSRT()">SRT 만들기</button>
      <div id="mediaArea"></div>
    </div>

  </div>
</div>

<script>
const API_URL="https://shorts-maker-api.onrender.com";
let latestCaptions=[];
let latestTTSText="";

async function generateShorts(){
    const sourceText=document.getElementById("sourceText").value.trim();
    const tone=document.getElementById("tone").value;

    if(!sourceText){
        alert("기사 입력해줘!");
        return;
    }

    document.getElementById("loading").style.display="block";

    try{
        const res=await fetch(API_URL+"/make-shorts",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                source_text:sourceText,
                tone:tone
            })
        });

        if(!res.ok){
            const err=await res.json();
            throw new Error(err.detail || "API 오류");
        }

        const data=await res.json();

        document.getElementById("formatted_script").innerText=data.formatted_script || "";
        document.getElementById("titles").innerText=(data.titles || []).join("\n");
        document.getElementById("recommended_title").innerText=data.recommended_title || "";
        document.getElementById("thumbnail_texts").innerText=(data.thumbnail_texts || []).join("\n");
        document.getElementById("view_points").innerText=(data.view_points || []).join("\n");
        document.getElementById("comment_hooks").innerText=(data.comment_hooks || []).join("\n");
        document.getElementById("strong_version").innerText=data.strong_version || "";

        latestCaptions=data.captions || [];
        latestTTSText=data.tts_text || "";

        document.getElementById("result").style.display="block";

    }catch(err){
        alert(err.message);
    }finally{
        document.getElementById("loading").style.display="none";
    }
}

async function makeTTS(){
    if(!latestTTSText){
        alert("먼저 쇼츠 생성해줘!");
        return;
    }

    try{
        const res=await fetch(API_URL+"/make-tts",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                text:latestTTSText
            })
        });

        const data=await res.json();

        if(!res.ok){
            throw new Error(data.detail || "TTS 실패");
        }

        const audio=document.createElement("audio");
        audio.controls=true;
        audio.src=API_URL + data.audio_url;

        const area=document.getElementById("mediaArea");
        area.innerHTML="";
        area.appendChild(audio);

    }catch(err){
        alert(err.message);
    }
}

async function makeSRT(){
    if(!latestCaptions.length){
        alert("먼저 쇼츠 생성해줘!");
        return;
    }

    try{
        const res=await fetch(API_URL+"/make-srt",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                captions:latestCaptions
            })
        });

        const data=await res.json();

        if(!res.ok){
            throw new Error(data.detail || "SRT 실패");
        }

        const link=document.createElement("a");
        link.href=API_URL + data.srt_url;
        link.innerText="SRT 다운로드";
        link.target="_blank";
        link.style.display="block";
        link.style.marginTop="20px";

        document.getElementById("mediaArea").appendChild(link);

    }catch(err){
        alert(err.message);
    }
}
</script>
</body>
</html>
