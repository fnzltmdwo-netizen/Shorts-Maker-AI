<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>승재 쇼츠 자동 생성기</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #111; color: white; }
    .container { max-width: 900px; margin: 0 auto; padding: 30px 18px; }
    h1 { text-align: center; margin-bottom: 10px; }
    .desc { text-align: center; color: #aaa; margin-bottom: 28px; }
    textarea { width: 100%; min-height: 220px; padding: 16px; border-radius: 12px; border: none; resize: vertical; font-size: 15px; box-sizing: border-box; }
    button { width: 100%; margin-top: 12px; padding: 15px; border: none; border-radius: 12px; background: #ff3b5c; color: white; font-size: 17px; font-weight: bold; cursor: pointer; }
    button:disabled { background: #555; cursor: not-allowed; }
    .card { margin-top: 22px; background: #1f1f1f; border-radius: 16px; padding: 18px; box-sizing: border-box; }
    .card h2 { margin-top: 0; font-size: 20px; }
    pre { white-space: pre-wrap; word-break: keep-all; line-height: 1.65; background: #151515; padding: 14px; border-radius: 12px; color: #f1f1f1; }
    audio, video { width: 100%; margin-top: 12px; border-radius: 14px; }
    .status { margin-top: 14px; color: #ffd166; text-align: center; font-weight: bold; }
    .hidden { display: none; }
    a { color: #7cc7ff; word-break: break-all; }
    .small { color: #aaa; font-size: 13px; line-height: 1.5; }
  </style>
</head>

<body>
  <div class="container">
    <h1>승재 쇼츠 자동 생성기</h1>
    <p class="desc">기사 붙여넣기 → 대본 → AI 음성 → 자막 영상 생성</p>

    <textarea id="articleInput" placeholder="여기에 기사 내용을 붙여넣어줘"></textarea>

    <button id="scriptBtn" onclick="generateScript()">1. 쇼츠 대본 생성</button>
    <button id="voiceBtn" onclick="generateVoice()" disabled>2. AI 음성 생성</button>
    <button id="videoBtn" onclick="makeVideo()" disabled>3. 영상 만들기</button>

    <div id="status" class="status"></div>

    <div id="scriptBox" class="card hidden">
      <h2>생성된 제목</h2>
      <pre id="titleOutput"></pre>

      <h2>화면 대본</h2>
      <pre id="scriptOutput"></pre>

      <h2>AI 음성용 대본</h2>
      <pre id="ttsOutput"></pre>
    </div>

    <div id="voiceBox" class="card hidden">
      <h2>AI 음성</h2>
      <audio id="audioPlayer" controls></audio>
      <p id="voiceLink" class="small"></p>
    </div>

    <div id="videoBox" class="card hidden">
      <h2>완성 영상</h2>
      <video id="videoPlayer" controls></video>
      <p id="videoLink" class="small"></p>
      <p id="srtLink" class="small"></p>
    </div>
  </div>

  <script>
    const API_BASE = "https://shorts-maker-api.onrender.com";

    let shortsData = {
      title: "",
      script: "",
      tts_text: "",
      voice_url: "",
      alignment_url: "",
      video_url: "",
      srt_url: ""
    };

    function setStatus(message) {
      document.getElementById("status").innerText = message;
    }

    function setLoading(buttonId, isLoading, text) {
      const btn = document.getElementById(buttonId);
      btn.disabled = isLoading;
      if (text) btn.innerText = text;
    }

    async function generateScript() {
      const article = document.getElementById("articleInput").value.trim();

      if (!article) {
        alert("기사 내용을 먼저 붙여넣어줘!");
        return;
      }

      try {
        setStatus("쇼츠 대본 생성 중...");
        setLoading("scriptBtn", true, "대본 생성 중...");

        document.getElementById("voiceBtn").disabled = true;
        document.getElementById("videoBtn").disabled = true;

        const res = await fetch(`${API_BASE}/generate-script`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ article })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.detail || "대본 생성 실패");
        }

        shortsData.title = data.title || "";
        shortsData.script = data.script || "";
        shortsData.tts_text = data.tts_text || data.script || "";
        shortsData.voice_url = "";
        shortsData.alignment_url = "";
        shortsData.video_url = "";
        shortsData.srt_url = "";

        document.getElementById("titleOutput").innerText = shortsData.title;
        document.getElementById("scriptOutput").innerText = shortsData.script;
        document.getElementById("ttsOutput").innerText = shortsData.tts_text;

        document.getElementById("scriptBox").classList.remove("hidden");
        document.getElementById("voiceBox").classList.add("hidden");
        document.getElementById("videoBox").classList.add("hidden");
        document.getElementById("voiceBtn").disabled = false;

        setStatus("대본 생성 완료! 이제 AI 음성을 만들어줘.");
      } catch (err) {
        console.error(err);
        alert("대본 생성 실패: " + err.message);
        setStatus("대본 생성 실패");
      } finally {
        setLoading("scriptBtn", false, "1. 쇼츠 대본 생성");
      }
    }

    async function generateVoice() {
      if (!shortsData.tts_text) {
        alert("먼저 대본을 생성해줘!");
        return;
      }

      try {
        setStatus("AI 음성 생성 중...");
        setLoading("voiceBtn", true, "음성 생성 중...");
        document.getElementById("videoBtn").disabled = true;

        const res = await fetch(`${API_BASE}/generate-voice`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text: shortsData.tts_text })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.detail || "음성 생성 실패");
        }

        shortsData.voice_url = data.voice_url || "";
        shortsData.alignment_url = data.alignment_url || "";
        shortsData.tts_text = data.tts_text || shortsData.tts_text;

        const fullAudioUrl = `${API_BASE}${shortsData.voice_url}`;

        document.getElementById("audioPlayer").src = fullAudioUrl;
        document.getElementById("voiceLink").innerHTML =
          `음성 파일: <a href="${fullAudioUrl}" target="_blank">${fullAudioUrl}</a>`;

        document.getElementById("voiceBox").classList.remove("hidden");
        document.getElementById("videoBox").classList.add("hidden");
        document.getElementById("videoBtn").disabled = false;

        setStatus("음성 생성 완료! 이제 영상 만들기를 눌러줘.");
      } catch (err) {
        console.error(err);
        alert("음성 생성 실패: " + err.message);
        setStatus("음성 생성 실패");
      } finally {
        setLoading("voiceBtn", false, "2. AI 음성 생성");
      }
    }

    async function makeVideo() {
      if (!shortsData.voice_url) {
        alert("먼저 AI 음성을 생성해줘!");
        return;
      }

      try {
        setStatus("영상 생성 중... 시간이 조금 걸릴 수 있어.");
        setLoading("videoBtn", true, "영상 생성 중...");

        const res = await fetch(`${API_BASE}/make-video`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            title: shortsData.title,
            script: shortsData.script,
            tts_text: shortsData.tts_text,
            voice_url: shortsData.voice_url,
            alignment_url: shortsData.alignment_url
          })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.detail || "영상 생성 실패");
        }

        shortsData.video_url = data.video_url || "";
        shortsData.srt_url = data.srt_url || "";

        const fullVideoUrl = `${API_BASE}${shortsData.video_url}`;
        const fullSrtUrl = `${API_BASE}${shortsData.srt_url}`;

        document.getElementById("videoPlayer").src = fullVideoUrl;
        document.getElementById("videoLink").innerHTML =
          `영상 파일: <a href="${fullVideoUrl}" target="_blank">${fullVideoUrl}</a>`;
        document.getElementById("srtLink").innerHTML =
          `자막 파일: <a href="${fullSrtUrl}" target="_blank">${fullSrtUrl}</a>`;

        document.getElementById("videoBox").classList.remove("hidden");

        setStatus("영상 생성 완료!");
      } catch (err) {
        console.error(err);
        alert("영상 생성 실패: " + err.message);
        setStatus("영상 생성 실패");
      } finally {
        setLoading("videoBtn", false, "3. 영상 만들기");
      }
    }
  </script>
</body>
</html>
