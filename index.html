<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Shorts Maker AI</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #fff7d6, #ffe2ef);
      font-family: Arial, "Noto Sans KR", sans-serif;
      color: #222;
    }

    .container {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 32px;
      text-align: center;
    }

    h2 {
      margin-top: 0;
    }

    .subtitle {
      margin: 0 0 24px;
      text-align: center;
      color: #666;
      line-height: 1.6;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    .tab {
      flex: 1;
      padding: 14px;
      border-radius: 14px;
      border: none;
      font-weight: 800;
      cursor: pointer;
      background: #f1f1f1;
    }

    .tab.active {
      background: #ffb703;
      color: #111;
    }

    .section {
      display: none;
    }

    .section.active {
      display: block;
    }

    .label {
      font-weight: 700;
      margin-bottom: 10px;
      display: block;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 2px solid #eee;
      border-radius: 16px;
      padding: 16px;
      font-size: 16px;
      outline: none;
      font-family: inherit;
      background: white;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: #ffb703;
    }

    textarea {
      min-height: 340px;
      resize: vertical;
      line-height: 1.6;
    }

    .field {
      margin-bottom: 18px;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 16px 0;
    }

    .buttons {
      display: flex;
      gap: 12px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    button {
      flex: 1;
      min-width: 180px;
      border: none;
      border-radius: 14px;
      padding: 16px 20px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.15s;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .primary {
      background: #ffb703;
      color: #111;
    }

    .secondary {
      background: #f1f1f1;
      color: #333;
    }

    .primary:hover:not(:disabled),
    .secondary:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    .status {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 14px;
      display: none;
      line-height: 1.5;
      white-space: pre-line;
    }

    .status.info {
      display: block;
      background: #eef6ff;
      color: #23527c;
    }

    .status.success {
      display: block;
      background: #eaf8ef;
      color: #1f7a3f;
    }

    .status.error {
      display: block;
      background: #ffecec;
      color: #b00020;
    }

    .preview,
    .result-box {
      margin-top: 24px;
      display: none;
    }

    .block,
    .person-card {
      border: 1px solid #eee;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
      background: #fafafa;
    }

    .time {
      font-weight: 700;
      color: #ff8a00;
      margin-bottom: 6px;
    }

    .person-name {
      font-size: 26px;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .badge {
      display: inline-block;
      margin-right: 6px;
      margin-bottom: 6px;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      background: #fff1bd;
    }

    .link-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .search-link {
      display: inline-block;
      color: #111;
      background: #ffb703;
      padding: 10px 14px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 800;
    }

    .image-link {
      background: #ffe08a;
    }

    .sample,
    .footer {
      color: #777;
      font-size: 14px;
      line-height: 1.5;
    }

    .footer {
      text-align: center;
      margin-top: 18px;
    }

    @media (max-width: 600px) {
      .container {
        padding: 24px 12px;
      }

      .card {
        padding: 24px 18px;
      }

      h1 {
        font-size: 26px;
      }

      textarea {
        min-height: 280px;
      }

      .tabs {
        flex-direction: column;
      }

      .filter-grid {
        grid-template-columns: 1fr;
      }

      button {
        width: 100%;
      }

      .search-link {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <h1>🎬 Shorts Maker AI</h1>

      <p class="subtitle">
        제목 폴더 + 프리미어용 음성 패키지 생성 + 트로트 인물 랜덤 추천
      </p>

      <div class="tabs">
        <button class="tab active" onclick="showTab('audio')">🎧 Audio Pack</button>
        <button class="tab" onclick="showTab('trot')">🎲 트로트 인물 추천</button>
      </div>

      <section id="audioSection" class="section active">
        <div class="field">
          <label class="label" for="titleInput">영상 제목 / 폴더명</label>
          <input
            id="titleInput"
            type="text"
            placeholder="예: 97세 제자, 17세 선생님 등장"
          />
        </div>

        <div class="field">
          <label class="label" for="scriptInput">쇼츠 대본</label>

          <textarea id="scriptInput" placeholder="예시:
🎬 숏츠 대본

0~2초 (훅)
“97세 할아버지의 선생님이… 17세 오유진?”

2~6초
“전수경 아버지가 전국가요제 도전에 나섰는데요”

6~10초
“무려 97세지만”"></textarea>
        </div>

        <div class="sample">
          제목은 zip 안의 폴더명으로 사용됩니다.<br />
          대본은 <b>대본.txt</b>에 원본 그대로 저장됩니다.
        </div>

        <div class="buttons">
          <button class="secondary" onclick="previewScript()">대본 확인</button>
          <button class="primary" onclick="generatePack()">패키지 생성 & 다운로드</button>
        </div>

        <div id="status" class="status"></div>

        <div id="preview" class="preview">
          <h2>대본 분석 결과</h2>
          <div id="previewList"></div>
        </div>
      </section>

      <section id="trotSection" class="section">
        <h2>🎲 트로트 인물 랜덤 추천기</h2>

        <p class="sample">
          오늘 다룰 트로트 인물을 랜덤으로 추천합니다.
        </p>

        <div class="filter-grid">
          <div>
            <label class="label">성별</label>
            <select id="genderFilter">
              <option value="전체">전체</option>
              <option value="남자">남자</option>
              <option value="여자">여자</option>
            </select>
          </div>

          <div>
            <label class="label">화제도</label>
            <select id="levelFilter">
              <option value="전체">전체</option>
              <option value="HOT">HOT</option>
              <option value="숨은인물">숨은인물</option>
            </select>
          </div>
        </div>

        <div class="buttons">
          <button class="primary" onclick="pickOnePerson()">1명 추천</button>
          <button class="secondary" onclick="pickFivePeople()">5명 추천</button>
        </div>

        <div id="trotStatus" class="status"></div>

        <div id="trotResult" class="result-box">
          <h2>추천 결과</h2>
          <div id="personList"></div>
        </div>
      </section>
    </div>

    <div class="footer">
      생성 파일: 제목 폴더 / 1.mp3, 2.mp3, subtitles.srt, 대본.txt, premiere_guide.txt
    </div>
  </div>

  <script>
    const API_BASE_URL = "https://shorts-maker-api.onrender.com";

    function showTab(tab) {
      document.querySelectorAll(".tab").forEach((btn) => btn.classList.remove("active"));
      document.querySelectorAll(".section").forEach((sec) => sec.classList.remove("active"));

      if (tab === "audio") {
        document.querySelectorAll(".tab")[0].classList.add("active");
        document.getElementById("audioSection").classList.add("active");
      } else {
        document.querySelectorAll(".tab")[1].classList.add("active");
        document.getElementById("trotSection").classList.add("active");
      }
    }

    function setStatus(message, type = "info") {
      const status = document.getElementById("status");
      status.className = "status " + type;
      status.textContent = message;
    }

    function setTrotStatus(message, type = "info") {
      const status = document.getElementById("trotStatus");
      status.className = "status " + type;
      status.textContent = message;
    }

    function getTitleText() {
      return document.getElementById("titleInput").value.trim();
    }

    function getScriptText() {
      return document.getElementById("scriptInput").value.trim();
    }

    function validateScript(script) {
      if (!script) {
        setStatus("대본을 입력해줘!", "error");
        return false;
      }

      if (!script.match(/\d+(\.\d+)?\s*[~\-]\s*\d+(\.\d+)?\s*초/)) {
        setStatus("시간 형식이 필요해!\n예: 0~2초", "error");
        return false;
      }

      return true;
    }

    function getPayload() {
      const title = getTitleText() || "shorts_project";
      const script = getScriptText();

      return {
        title,
        script,
      };
    }

    async function previewScript() {
      const payload = getPayload();

      if (!validateScript(payload.script)) {
        return;
      }

      setStatus("대본을 분석하는 중...", "info");

      try {
        const response = await fetch(API_BASE_URL + "/parse-script", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(payload),
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.detail || "대본 분석 실패");
        }

        const preview = document.getElementById("preview");
        const previewList = document.getElementById("previewList");

        previewList.innerHTML = "";

        const titleBlock = document.createElement("div");
        titleBlock.className = "block";
        titleBlock.innerHTML = `
          <div class="time">폴더명</div>
          <div>${escapeHtml(data.title || payload.title)}</div>
        `;
        previewList.appendChild(titleBlock);

        data.blocks.forEach((block, index) => {
          const div = document.createElement("div");
          div.className = "block";

          div.innerHTML = `
            <div class="time">${index + 1}. ${block.start}초 ~ ${block.end}초</div>
            <div>${escapeHtml(block.text)}</div>
          `;

          previewList.appendChild(div);
        });

        preview.style.display = "block";
        setStatus(`대본 분석 완료! 총 ${data.count}개 구간`, "success");
      } catch (error) {
        setStatus("오류 발생: " + error.message, "error");
      }
    }

    async function generatePack() {
      const payload = getPayload();

      if (!validateScript(payload.script)) {
        return;
      }

      const buttons = document.querySelectorAll("button");
      buttons.forEach((button) => (button.disabled = true));

      setStatus("음성 패키지를 생성하는 중...\n조금 걸릴 수 있어.", "info");

      try {
        const response = await fetch(API_BASE_URL + "/generate-pack", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(payload),
        });

        if (!response.ok) {
          let message = "패키지 생성 실패";

          try {
            const data = await response.json();
            message = data.detail || message;
          } catch (e) {}

          throw new Error(message);
        }

        const blob = await response.blob();
        const disposition = response.headers.get("Content-Disposition");

        let filename = "audio_pack.zip";

        if (disposition && disposition.includes("filename=")) {
          filename = disposition
            .split("filename=")[1]
            .replaceAll('"', "")
            .trim();
        }

        const url = window.URL.createObjectURL(blob);
        const a = document.createElement("a");

        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();

        a.remove();
        window.URL.revokeObjectURL(url);

        setStatus("완료! 제목 폴더가 포함된 zip 다운로드가 시작됐어 🎉", "success");
      } catch (error) {
        setStatus("오류 발생: " + error.message, "error");
      } finally {
        buttons.forEach((button) => (button.disabled = false));
      }
    }

    function getTrotFilters() {
      return {
        gender: document.getElementById("genderFilter").value,
        level: document.getElementById("levelFilter").value,
      };
    }

    async function pickOnePerson() {
      const { gender, level } = getTrotFilters();
      setTrotStatus("추천 중...", "info");

      try {
        const url =
          `${API_BASE_URL}/random-trot-person?gender=${encodeURIComponent(gender)}&level=${encodeURIComponent(level)}`;

        const response = await fetch(url);
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.detail || "추천 실패");
        }

        renderPeople([data.person]);
        setTrotStatus("1명 추천 완료!", "success");
      } catch (error) {
        setTrotStatus("오류 발생: " + error.message, "error");
      }
    }

    async function pickFivePeople() {
      const { gender, level } = getTrotFilters();
      setTrotStatus("추천 중...", "info");

      try {
        const url =
          `${API_BASE_URL}/random-trot-people?count=5&gender=${encodeURIComponent(gender)}&level=${encodeURIComponent(level)}`;

        const response = await fetch(url);
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.detail || "추천 실패");
        }

        renderPeople(data.people);
        setTrotStatus(`${data.count}명 추천 완료!`, "success");
      } catch (error) {
        setTrotStatus("오류 발생: " + error.message, "error");
      }
    }

    function renderPeople(people) {
      const result = document.getElementById("trotResult");
      const list = document.getElementById("personList");

      list.innerHTML = "";

      people.forEach((person) => {
        const newsUrl =
          person.google_news_url ||
          person.google_search_url ||
          person.naver_search_url ||
          "#";

        const imageUrl =
          person.google_image_url ||
          person.google_search_url ||
          person.naver_search_url ||
          "#";

        const div = document.createElement("div");
        div.className = "person-card";

        div.innerHTML = `
          <div class="person-name">${escapeHtml(person.name)}</div>
          <span class="badge">${escapeHtml(person.gender)}</span>
          <span class="badge">${escapeHtml(person.level)}</span>
          <span class="badge">${escapeHtml(person.category)}</span>

          <div class="link-row">
            <a class="search-link" href="${newsUrl}" target="_blank">
              📰 최신 기사 보기
            </a>
            <a class="search-link image-link" href="${imageUrl}" target="_blank">
              🖼 사진 찾기
            </a>
          </div>
        `;

        list.appendChild(div);
      });

      result.style.display = "block";
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
